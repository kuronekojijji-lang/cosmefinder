<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コスメマネキン | 顔パーツで選ぶ日本コスメ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#D4849A;--rose-light:#FFF0EE;--rose-mid:#F5C8D0;
  --brown:#7A4F4A;--cream:#FDF8F5;--text:#3D2020;
  --text-light:#997070;--white:#FFFFFF;
  --shadow:0 2px 14px rgba(160,80,80,0.10);
}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
/* ── Header ── */
header{background:linear-gradient(135deg,#F2D0D8 0%,#F8E8E0 100%);padding:14px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #ECC8D0}
header .logo{font-size:26px}
header h1{font-size:19px;color:var(--brown);font-weight:800;letter-spacing:-0.3px}
header p{font-size:12px;color:var(--text-light);margin-top:1px}
/* ── Look bar / tone bar ── */
.look-bar{background:var(--white);padding:8px 20px;border-bottom:1px solid #F0DDD9;display:flex;gap:6px;align-items:center;overflow-x:auto;flex-shrink:0}
.tone-bar{background:#FDF5F8;padding:7px 20px;border-bottom:1px solid #F0DDD9;display:flex;gap:6px;align-items:center;overflow-x:auto;flex-shrink:0}
.look-bar-label{font-size:12px;color:var(--text-light);white-space:nowrap;margin-right:2px;font-weight:600}
.look-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--rose-mid);background:transparent;color:var(--brown);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:inherit}
.look-btn:hover{border-color:var(--rose);color:var(--rose)}
.look-btn.active{background:var(--rose);color:white;border-color:var(--rose)}
/* ── Layout ── */
.main{display:grid;grid-template-columns:310px 1fr;height:calc(100vh - 130px)}
/* ── Face panel ── */
.face-panel{background:var(--white);border-right:1px solid #F0DDD9;display:flex;flex-direction:column;align-items:center;padding:20px 14px;overflow-y:auto}
.face-hint{font-size:12px;color:var(--text-light);margin-bottom:14px;text-align:center;line-height:1.6}
.face-hint strong{display:block;color:var(--rose);font-size:13px;margin-bottom:2px}
/* ── Image face container ── */
.face-container{
  position:relative;width:270px;height:380px;overflow:hidden;margin:0 auto;
  background:url('manekin.svg') no-repeat 0px 0px;
  background-size:700px auto;
}
.manekin-img{display:none}
.zone-overlay{position:absolute;border-radius:50%;transition:background .22s;cursor:pointer}
/* X=px(顔中心x≈138px), Y=% */
#ov-skin    {top:8%;   left:76px;  width:130px; height:24%; background:rgba(255,128,80,0.05)}
#ov-brow-l  {top:34%;  left:40px;  width:78px;  height:9%;  background:rgba(80,80,200,0.05);border-radius:30px}
#ov-brow-r  {top:34%;  left:152px; width:78px;  height:9%;  background:rgba(80,80,200,0.05);border-radius:30px}
#ov-eye-l   {top:42%;  left:28px;  width:96px;  height:13%; background:rgba(128,96,232,0.05)}
#ov-eye-r   {top:42%;  left:148px; width:96px;  height:13%; background:rgba(128,96,232,0.05)}
#ov-cheek-l {top:51%;  left:30px;  width:72px;  height:18%; background:rgba(255,80,112,0.05)}
#ov-cheek-r {top:51%;  left:170px; width:72px;  height:18%; background:rgba(255,80,112,0.05)}
#ov-lip     {top:68%;  left:84px;  width:110px; height:13%; background:rgba(255,32,80,0.05)}
.zone-label-pill{position:absolute;background:rgba(255,255,255,0.88);color:#A05840;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;pointer-events:none;white-space:nowrap;transform:translateX(-50%)}
/* ── Budget / tone filters ── */
.budget-wrap{width:100%;margin-top:18px;padding-top:14px;border-top:1px solid #F0DDD9}
.filter-label{font-size:11px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 11px;border-radius:12px;border:1px solid #E0C8C4;background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.chip:hover{border-color:var(--rose);color:var(--rose)}
.chip.active{background:var(--rose);color:white;border-color:var(--rose)}
/* パーソナルカラー chips */
.chip[data-tone="イエベ春"]        {border-color:#F5C060}
.chip[data-tone="イエベ春"]:hover  {border-color:#E8A020;color:#A06000;background:#FFF8E8}
.chip[data-tone="イエベ春"].active {background:#E8A020;color:white;border-color:#E8A020}
.chip[data-tone="イエベ秋"]        {border-color:#C07830}
.chip[data-tone="イエベ秋"]:hover  {border-color:#A05010;color:#703000;background:#FFF0E0}
.chip[data-tone="イエベ秋"].active {background:#A05010;color:white;border-color:#A05010}
.chip[data-tone="ブルベ夏"]        {border-color:#C0A8C8}
.chip[data-tone="ブルベ夏"]:hover  {border-color:#9060A0;color:#604878;background:#F8F0FC}
.chip[data-tone="ブルベ夏"].active {background:#9060A0;color:white;border-color:#9060A0}
.chip[data-tone="ブルベ冬"]        {border-color:#8090C8}
.chip[data-tone="ブルベ冬"]:hover  {border-color:#3050A0;color:#203070;background:#EEF0FC}
.chip[data-tone="ブルベ冬"].active {background:#3050A0;color:white;border-color:#3050A0}
/* ── Products panel ── */
.products-panel{overflow-y:auto;padding:22px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.panel-head h2{font-size:17px;color:var(--brown);font-weight:700}
.zone-badge{display:inline-flex;align-items:center;gap:5px;background:var(--rose-light);color:var(--rose);padding:3px 11px;border-radius:11px;font-size:12px;font-weight:700;border:1px solid var(--rose-mid)}
/* ── Zone filters ── */
.zone-filters{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:18px;background:var(--white);padding:12px 14px;border-radius:10px;box-shadow:var(--shadow)}
/* ── Products grid ── */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px}
.product-card{background:white;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s}
.product-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(160,80,80,0.16)}
.product-img{height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:white;padding:8px}
.product-img .brand-badge{font-size:11px;font-weight:800;letter-spacing:.5px;background:rgba(0,0,0,.18);padding:3px 8px;border-radius:8px;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-img .img-icon{font-size:28px}
.product-info{padding:11px}
.product-brand{font-size:10px;color:var(--text-light);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:1px}
.product-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4}
.product-desc{font-size:11px;color:var(--text-light);margin-bottom:8px;line-height:1.5}
.product-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.product-price{font-size:15px;font-weight:800;color:var(--brown)}
.tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:10px;background:var(--rose-light);color:var(--rose);padding:2px 6px;border-radius:5px;border:1px solid var(--rose-mid)}
.buy-btns{display:flex;gap:5px}
.buy-btn{flex:1;padding:7px 4px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:opacity .15s;display:block;font-family:inherit}
.btn-amazon{background:#FF9900;color:white}
.btn-rakuten{background:#BF0000;color:white}
.buy-btn:hover{opacity:.82}
/* ── Popular badge ── */
.popular-badge{position:absolute;top:7px;right:7px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,.25);letter-spacing:.2px;pointer-events:none}
/* ── Empty state ── */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .e-icon{font-size:52px;margin-bottom:14px}
.empty-state p{font-size:14px;line-height:1.8}
/* ── Responsive ── */
@media(max-width:740px){
  .main{grid-template-columns:1fr;height:auto}
  .face-panel{border-right:none;border-bottom:1px solid #F0DDD9}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>

const BUDGET_RANGES = { low:[0,1000], mid:[1000,3000], high:[3000,Infinity], all:[0,Infinity] };

// ── State ────────────────────────────────────────────────────
const S = { zone:null, look:'all', budget:'all', finish:null, tone:'all' };

// ── Helpers ──────────────────────────────────────────────────
function adjColor(hex, n) {
  const v = parseInt(hex.slice(1),16);
  const r = Math.max(0,Math.min(255,(v>>16)+n));
  const g = Math.max(0,Math.min(255,((v>>8)&0xFF)+n));
  const b = Math.max(0,Math.min(255,(v&0xFF)+n));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

function setOverlays(hoverZone = null) {
  Object.entries(ZONES).forEach(([z, zc]) => {
    const alpha = z === S.zone ? 0.35 : z === hoverZone ? 0.18 : 0.05;
    zc.overlays.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.background = zc.color + alpha + ')';
    });
  });
}

// ── Render ───────────────────────────────────────────────────
function renderAll() {
  // Header
  const title = document.getElementById('panel-title');
  const badge = document.getElementById('zone-badge');
  const filtersEl = document.getElementById('zone-filters');

  setOverlays();

  if (!S.zone) {
    title.textContent = 'パーツを選んでください';
    badge.style.display = 'none';
    filtersEl.style.display = 'none';
    renderProducts([]);
    return;
  }

  const zc = ZONES[S.zone];
  title.textContent = `${zc.icon} ${zc.label}のコスメ`;
  badge.style.display = 'inline-flex';

  // Finish filters
  filtersEl.style.display = 'flex';
  filtersEl.innerHTML = `
    <div>
      <div class="filter-label">仕上がり</div>
      <div class="chip-row">
        <button class="chip ${!S.finish?'active':''}" data-finish="">すべて</button>
        ${zc.finishes.map(f=>`<button class="chip ${S.finish===f?'active':''}" data-finish="${f}">${f}</button>`).join('')}
      </div>
    </div>`;
  filtersEl.querySelectorAll('[data-finish]').forEach(btn => {
    btn.addEventListener('click', () => { S.finish = btn.dataset.finish||null; renderAll(); });
  });

  // Filter products
  const [bMin, bMax] = BUDGET_RANGES[S.budget];
  let items = (DB[S.zone]||[]).filter(p => {
    if (S.look !== 'all' && !p.look.includes(S.look)) return false;
    if (p.price < bMin || p.price >= bMax) return false;
    if (S.finish && !p.finish.includes(S.finish)) return false;
    if (S.tone !== 'all' && !(p.tone||[]).includes(S.tone)) return false;
    return true;
  });

  badge.textContent = items.length + '件';
  renderProducts(items);
}

function renderProducts(items) {
  const grid = document.getElementById('products-grid');
  if (!S.zone) {
    grid.innerHTML = `<div class="empty-state"><div class="e-icon">👆</div><p>左のマネキンの顔パーツをクリックして<br>おすすめのコスメを探してみよう</p></div>`;
    return;
  }
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><p>条件に合う商品が見つかりませんでした<br>フィルターを変えてみてください</p></div>`;
    return;
  }
  grid.innerHTML = items.map(p => `
    <div class="product-card">
      ${p.img
        ? `<div class="product-img" style="background:${p.bg};padding:0;overflow:hidden;position:relative">
             <img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;padding:8px" onerror="this.parentElement.innerHTML='<div style=\\'font-size:32px;margin-bottom:4px\\'>${p.icon}</div><div class=\\'brand-badge\\'>${p.brand}</div>'">
             ${p.popular ? `<div class="popular-badge" style="${popularStyle(p.popular)}">${p.popular}</div>` : ''}
           </div>`
        : `<div class="product-img" style="background:linear-gradient(135deg,${p.bg},${adjColor(p.bg,-30)});position:relative">
             <div style="font-size:32px">${p.icon}</div>
             <div class="brand-badge">${p.brand}</div>
             ${p.popular ? `<div class="popular-badge" style="${popularStyle(p.popular)}">${p.popular}</div>` : ''}
           </div>`
      }
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-meta">
          <div class="product-price">¥${p.price.toLocaleString()}</div>
          <div class="tags">${p.finish.slice(0,2).map(f=>`<span class="tag">${f}</span>`).join('')}</div>
        </div>
        ${(p.tone||[]).length ? `<div class="tags" style="margin-bottom:8px">${(p.tone).map(t=>{
          const tc = t==='イエベ春'?'#E8A020':t==='イエベ秋'?'#A05010':t==='ブルベ夏'?'#9060A0':'#3050A0';
          return `<span class="tag" style="background:${tc}18;color:${tc};border-color:${tc}60;font-size:9px">${t}</span>`;
        }).join('')}</div>` : ''}
        <div class="buy-btns">
          <a class="buy-btn btn-amazon" href="${p.amazon}" target="_blank" rel="noopener noreferrer">Amazon</a>
          <a class="buy-btn btn-rakuten" href="${p.rakuten}" target="_blank" rel="noopener noreferrer">楽天</a>
        </div>
      </div>
    </div>`).join('');
}

// ── Events ───────────────────────────────────────────────────
document.querySelectorAll('.zone').forEach(el => {
  el.addEventListener('click', e => {
    const z = e.currentTarget.dataset.zone;
    S.zone   = S.zone === z ? null : z;
    S.finish = null;
    renderAll();
  });
  el.addEventListener('mouseenter', e => { setOverlays(e.currentTarget.dataset.zone); });
  el.addEventListener('mouseleave', () => { setOverlays(); });
});

document.querySelectorAll('[data-look]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-look]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.look = btn.dataset.look;
    renderAll();
  });
});

document.querySelectorAll('[data-budget]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-budget]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.budget = btn.dataset.budget;
    renderAll();
  });
});

document.querySelectorAll('[data-tone]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tone]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.tone = btn.dataset.tone;
    renderAll();
  });
});

// ── URL parameter init ────────────────────────────────────────
// Usage: ?zone=lip&look=natural&budget=low&finish=グロス&tone=ブルベ夏
(function initFromURL() {
  const p = new URLSearchParams(window.location.search);
  const zone   = p.get('zone');
  const look   = p.get('look');
  const budget = p.get('budget');
  const finish = p.get('finish');
  const tone   = p.get('tone');

  const VALID_TONES = ['all','イエベ春','イエベ秋','ブルベ夏','ブルベ冬'];

  if (zone   && ZONES[zone])                                     S.zone   = zone;
  if (look   && BUDGET_RANGES[look]   === undefined && ['all','natural','trendy','gorgeous','casual','office'].includes(look)) S.look = look;
  if (budget && BUDGET_RANGES[budget] !== undefined)             S.budget = budget;
  if (finish)                                                    S.finish = finish;
  if (tone   && VALID_TONES.includes(tone))                      S.tone   = tone;

  // Sync button UI
  if (look)   document.querySelectorAll('[data-look]').forEach(b   => b.classList.toggle('active', b.dataset.look   === (look||'all')));
  if (budget) document.querySelectorAll('[data-budget]').forEach(b => b.classList.toggle('active', b.dataset.budget === (budget||'all')));
  if (tone)   document.querySelectorAll('[data-tone]').forEach(b   => b.classList.toggle('active', b.dataset.tone   === (tone||'all')));

  if (zone || look || budget || finish || tone) renderAll();
})();
</script>
