<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
{{ partial "head.html" . }}
</head>
<body>
{{ partial "nav.html" . }}
{{ block "main" . }}{{ end }}
{{ partial "footer.html" . }}
<script>
(function(){
  var m = location.pathname.match(/^\/(ja|fr|zh-cn|ko)(\/|$)/);
  if (!m) return;
  var pfx = '/' + m[1];
  function rewrite() {
    document.querySelectorAll('a[href]').forEach(function(a) {
      var h = a.getAttribute('href');
      if (!h || h.charAt(0) === '#') return;
      if (/^(https?:|\/\/|mailto:|tel:)/.test(h)) return;
      if (/^\/(en|fr|zh-cn|ko)\//.test(h)) return;
      if (/^\/(en|fr|zh-cn|ko)$/.test(h)) return;
      if (h.charAt(0) === '/') a.setAttribute('href', pfx + h);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', rewrite);
  } else {
    rewrite();
  }
})();
</script>
</body>
</html>
