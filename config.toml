baseURL       = "https://cosmefinder.com/"
languageCode  = "ja"
title         = "コスメファインダー｜顔パーツで選ぶ日本コスメ"
paginate      = 12

[minify]
  disableJS = true

defaultContentLanguage          = "en"
defaultContentLanguageInSubdir  = false

[languages]
  [languages.ja]
    languageName = "日本語"
    languageCode = "ja"
    weight       = 1
    title        = "コスメファインダー｜顔パーツで選ぶ日本コスメ"
    [languages.ja.params]
      description = "顔のパーツをクリックするだけで、あなたにぴったりの日本コスメが見つかるツールと、プチプラからデパコスまで徹底比較するコスメ情報サイトです。"

  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight       = 2
    title        = "CosméFinder — Japanese Cosmetics Guide"
    [languages.en.params]
      description = "Discover the best Japanese cosmetics — from drugstore picks to department-store gems. Browse by face zone, look, and budget."

  [languages.fr]
    languageName = "Français"
    languageCode = "fr"
    weight       = 3
    title        = "CosméFinder — Guide des Cosmétiques Japonais"
    [languages.fr.params]
      description = "Découvrez les meilleurs cosmétiques japonais — des produits abordables aux trésors des grands magasins. Filtrez par zone du visage, look et budget."

  [languages.zh-cn]
    languageName = "简体中文"
    languageCode = "zh-cn"
    weight       = 4
    title        = "CosméFinder — 日本彩妆指南"
    [languages.zh-cn.params]
      description = "探索最佳日本彩妆产品——从平价药妆到百货精品，按部位、妆感和预算轻松筛选。"

  [languages.ko]
    languageName = "한국어"
    languageCode = "ko"
    weight       = 5
    title        = "CosméFinder — 일본 코스메 가이드"
    [languages.ko.params]
      description = "드럭스토어 추천부터 백화점 명품까지, 일본 코스메의 모든 것. 부위·룩·가격대별로 쉽게 찾아보세요."

[params]
  description  = "顔のパーツをクリックするだけで、あなたにぴったりの日本コスメが見つかるツールと、プチプラからデパコスまで徹底比較するコスメ情報サイトです。"
  author       = "コスメファインダー編集部"
  amazonID     = "96nekozizi-22"
  rakutenID    = "YOUR-RAKUTEN-ID"
  twitterSite  = "@cosme_finder"

[taxonomies]
  category = "categories"
  tag      = "tags"

[menu]
  [[menu.main]]
    name   = "コスメを探す"
    url    = "/tool/"
    weight = 1
  [[menu.main]]
    name   = "リップ"
    url    = "/categories/lip/"
    weight = 2
  [[menu.main]]
    name   = "アイメイク"
